# Runs the property_maintenance_mcp server in a container.
# The database is Neon (remote) — read from .env, not a local Postgres service.
#
# Bring up:
#     docker compose up --build
# Then point an MCP client at http://localhost:8000/mcp

services:
  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    env_file:
      - .env
    environment:
      # Server-side overrides only — DATABASE_URL, OPENAI_API_KEY, LANGFUSE_*
      # come from .env above.
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    ports:
      - "8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
